legend:
  title: Legend
  categories:
    - name: Presentations
      color: blue-6
    - name: Posters
      color: red-6
    - name: Activities
      color: teal-6
days:
  - name: "Session 1 (14:15 -- 15:45): whole group activities"
    events:
      - time: 14:15 to 14:30
        title: Overview of themes from all accepted workshop submissions
        category: Presentations
        slides: /assets/files/CAMCAD%20workshop%20intro.pdf
      - time: 14:30 to 14:55
        title: "Invited keynote talk \"Fostering transformative agency of children in the age of AI\" and Q&A"
        subtitle: Keynote speaker: Professor Netta Iivari (University of Oulu)
        category: Presentations
      - time: 14:55 to 15:45
        title: "Lightning presentations from participants and audience Q&A"
        subtitle: "Invited speakers: Hawra Rabaan (University of Maryland), Nomisha Chandran Kurian (University of Warwick), Diana Sarai Hernandez Manzo (Robert Gordon University), Keyu Mao (Zhejiang Normal University), Mennatullah Hendawy (University of California Santa Cruz), Yui Kondo (University of Oxford)" 
        category: Presentations
  - name: "Break and Poster session (15:45 -- 16:30): refreshments and informal discussions over posters from submissions"
    events:
      - time: 15:45 to 16:05
        title: Group A posters
        subtitle: "Half of the group will present their posters first, while the other half can enjoy refreshments and check out others' work"
        category: Posters
        poster:
          - /assets/submissions/3%20Li%20et%20al%20-%20Appearance..Robots.pdf
          - /assets/submissions/4%20Park%20and%20Lee%20-%20Repositioning..Collaboration.pdf
          - /assets/submissions/5%20Aadmi-Laamech%20et%20al%20-%20AI..Collaboration.pdf
          - /assets/submissions/6%20Hernandez%20-%20Young..Learning.pdf
          - /assets/submissions/7%20Rabaan%20and%20Erete%20-%20Enacting..Families.pdf
          - /assets/submissions/8%20Wang%20et%20al%20-%20Gather..Co-Play.pdf
          - /assets/submissions/9%20Sanseverino%20et%20al%20-%20AI..Bouldering.pdf
      - time: 16:10 to 16:30
        title: Group B posters
        subtitle: "The groups will swap so those who presented their posters first can see others' work, while others can share theirs"
        category: Posters
        poster:
          - /assets/submissions/10%20Ferrando%20and%20Ceccaldi%20-%20Toddlers..Communication.pdf
          - /assets/submissions/11%20Fernaeus%20et%20al%20-%20Scam..Research.pdf
          - /assets/submissions/13%20Hille%20-%20Learning..Robot.pdf
          - /assets/submissions/14%20Detsika%20et%20al%20-%20Childrens..Interfaces.pdf
          - /assets/submissions/15%20Kurian%20-%20Designing..Agency.pdf
          - /assets/submissions/16%20Kondo%20et%20al%20-%20Algorithmic..Selves.pdf
  - name: "Session 2 (16:30 -- 18:00): break-out group activities"
    events:
      - time: 16:30 to 17:00
        title: Group task on translating research insights about co-agency to implications for practice
        category: Activities
      - time: 17:00 to 17:30
        title: Group rotation and peer feedback
        category: Activities
      - time: 17:30 to 17:50
        title: Whole group review of results, sharing ideas, documenting outputs
        category: Activities
      - time: 17:50 to 18:00
        title: Workshop recap and next steps
        category: Presentations
